features:
  - cheevos
shared_features:
  - rewind
  - autosave
custom_features:
  citra_graphics_api:
    submenu: GRAPHICS
    prompt: GRAPHICS API
    description: Choose which renderer lr-azahar should use.
    choices:
      Auto: Auto
      OpenGL: OpenGL
      Vulkan: Vulkan
      Software: Software
    before: citra_resolution_factor
  citra_layout_option:
    prompt: SCREEN LAYOUT
    description: Arrange the dual screen layout.
    choices:
      Default Top-Bottom Screen: Default Top-Bottom Screen
      Single Screen Only: Single Screen Only
      Large Screen, Small Screen: Large Screen, Small Screen
      Side by Side: Side by Side
  citra_swap_screen:
    prompt: PROMINENT 3DS SCREEN
    description: Choose which screen is emphasized when the layout supports it.
    choices:
      Top: Top
      Bottom: Bottom
  citra_resolution_factor:
    submenu: GRAPHICS
    prompt: RENDERING RESOLUTION
    description: Enhancement. Increase the rendering resolution. Makes 3D objects clearer.
    choices:
      1x (Native): 1
      2x: 2
      3x: 3
      4x: 4
      5x: 5
      6x: 6
      7x: 7
      8x: 8
      9x: 9
      10x: 10
  citra_enable_mouse_touchscreen:
    submenu: CONTROLS
    prompt: MOUSE TO TOUCHSCREEN
    description: Enable mouse or touchpad pointer input to drive the emulated touch screen.
    choices:
      'On': enabled
      'Off': disabled
  citra_enable_touch_touchscreen:
    submenu: CONTROLS
    prompt: TOUCH TO TOUCHSCREEN
    description: Enable native touchscreen pointer input for the emulated touch screen.
    choices:
      'On': enabled
      'Off': disabled
  citra_enable_touch_pointer_timeout:
    submenu: CONTROLS
    prompt: TOUCH POINTER TIMEOUT
    description: Hide the touch pointer after inactivity.
    choices:
      'On': enabled
      'Off': disabled
  citra_use_hw_shader:
    submenu: GRAPHICS
    prompt: HARDWARE SHADERS
    description: Disable for compatibility in games that misbehave with hardware shaders.
    choices:
      'On': enabled
      'Off': disabled
  citra_use_vsync:
    submenu: GRAPHICS
    prompt: VSYNC
    description: Synchronize presentation to the display refresh. Can reduce tearing but may add input latency.
    choices:
      'On': enabled
      'Off': disabled
  citra_use_disk_shader_cache:
    submenu: GRAPHICS
    prompt: DISK SHADER CACHE
    description: Save hardware shader cache to disk to reduce stutter on subsequent runs.
    choices:
      'On': enabled
      'Off': disabled
  citra_async_shader_compilation:
    submenu: GRAPHICS
    prompt: ASYNC SHADER COMPILATION
    description: Compile Vulkan shaders in the background to reduce stutter. May cause temporary graphical glitches.
    choices:
      'Off': disabled
      'On': enabled
  citra_custom_textures:
    submenu: GRAPHICS
    prompt: LOAD CUSTOM TEXTURES
    description: Load replacement textures from the texture pack directory.
    choices:
      'Off': disabled
      'On': enabled
  citra_is_new_3ds:
    prompt: NEW 3DS MODE
    description: The New 3DS has a faster processor and extra controls.
    choices:
      'Off': Old 3DS
      'On': New 3DS
systems:
  - 3ds
